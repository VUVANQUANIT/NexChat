name: Gemini AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -q -U google-generativeai

      - name: Get PR Diff
        id: get_diff
        run: |
          # Lấy diff giữa branch hiện tại và branch đích
          git diff origin/${{ github.base_ref }}...origin/${{ github.head_ref }} > pr_diff.txt
          echo "diff_size=$(wc -c < pr_diff.txt)" >> $GITHUB_OUTPUT

      - name: Run Gemini Review
        id: gemini_review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python << 'EOF'
          import os
          import google.generativeai as genai

          api_key = os.environ.get("GEMINI_API_KEY")
          if not api_key:
              print("Error: GEMINI_API_KEY is not set.")
              exit(1)

          genai.configure(api_key=api_key)
          
          # Danh sách model ưu tiên từ mạnh nhất đến ổn định nhất
          # Dựa trên danh sách "khủng" của bạn
          priority_models = [
              "gemini-2.5-pro", 
              "gemini-2.0-pro",
              "gemini-1.5-pro",
              "gemini-pro-latest",
              "gemini-2.5-flash",
              "gemini-2.0-flash",
              "gemini-1.5-flash",
              "gemini-flash-latest"
          ]
          
          review_text = ""
          success = False
          
          try:
              with open("pr_diff.txt", "r", encoding="utf-8") as f:
                  diff_content = f.read()
          except Exception as e:
              print(f"Error reading diff: {e}")
              exit(1)

          if len(diff_content.strip()) < 10:
              with open("review_result.md", "w", encoding="utf-8") as f:
                  f.write("Thay đổi quá nhỏ để AI có thể đưa ra nhận xét ý nghĩa.")
              exit(0)

          prompt = f"""
          Bạn là một Senior Software Engineer và Architect chuyên nghiệp.
          Nhiệm vụ của bạn là review đoạn mã nguồn (diff) dự án Spring Boot (Java).
          Hãy phân tích cực kỳ kỹ lưỡng và đưa ra nhận xét theo các tiêu chuẩn production:
          1. Lỗi Logic & Bug.
          2. Bảo mật (Security).
          3. Hiệu năng (Performance).
          4. Clean Code & SOLID.
          
          Yêu cầu: Tiếng Việt, chuyên nghiệp, có ví dụ code nếu cần sửa.
          
          Nội dung Diff:
          {diff_content}
          """

          last_error = ""
          for model_name in priority_models:
              try:
                  print(f"Trying model: {model_name}...")
                  model = genai.GenerativeModel(model_name)
                  response = model.generate_content(prompt)
                  review_text = response.text
                  success = True
                  print(f"Successfully reviewed with {model_name}")
                  break
              except Exception as e:
                  last_error = str(e)
                  print(f"Model {model_name} failed: {last_error}")
                  continue
          
          if not success:
              review_text = f"❌ Không thể thực hiện review sau khi thử tất cả các model khả dụng.\n\nLỗi cuối cùng: {last_error}"
              try:
                  available = [m.name for m in genai.list_models() if 'generateContent' in m.supported_generation_methods]
                  review_text += f"\n\nCác model trong list của bạn: {', '.join(available)}"
              except: pass

          with open("review_result.md", "w", encoding="utf-8") as f:
              f.write(review_text)

          with open("review_result.md", "w", encoding="utf-8") as f:
              f.write(review_text)
          EOF

      - name: Post Comment to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reviewBody = fs.readFileSync('review_result.md', 'utf8');
            
            const commentHeader = "### 🤖 Gemini AI Code Review\n\n";
            const finalBody = commentHeader + reviewBody;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: finalBody
            });
