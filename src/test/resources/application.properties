spring.datasource.url=jdbc:h2:mem:spring_chat_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Dummy values for Cloudinary to avoid BeanCreationException during tests
cloudinary.cloud-name=test-cloud
cloudinary.api-key=test-key
cloudinary.api-secret=test-secret

# Defaults for missing production properties
DATABASE_URL=jdbc:h2:mem:dummy
JWT_SECRET=0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF
JWT_EXPIRATION=3600000
JWT_REFRESH_EXPIRATION=86400000
